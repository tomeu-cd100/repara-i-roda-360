<svg xmlns="http://www.w3.org/2000/svg" width="60mm" height="25mm" viewBox="0 0 60 25">
  <!-- Plantilla M1: placa identificativa de la bici. Unitats = mm (1 unitat SVG = 1 mm).
       CONVENCIÓ: vermell #FF0000 = TALL · negre = GRAVAT (raster) · blau #0000FF = marca (score).
       Substitueix "NN" pel número de la bici i personalitza el detall. -->
  <!-- TALL: contorn arrodonit -->
  <rect x="0.1" y="0.1" width="59.8" height="24.8" rx="3" ry="3"
        fill="none" stroke="#FF0000" stroke-width="0.1"/>
  <!-- TALL: forat de fixació Ø4 -->
  <circle cx="7" cy="12.5" r="2" fill="none" stroke="#FF0000" stroke-width="0.1"/>
  <!-- GRAVAT: text (edita'l) -->
  <text x="15" y="11" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#000000">BICI NN</text>
  <text x="15" y="19" font-family="Arial, sans-serif" font-size="4" fill="#000000">Repara i Roda 360</text>
  <!-- MARCA (opcional): línia separadora -->
  <line x1="14" y1="13" x2="55" y2="13" stroke="#0000FF" stroke-width="0.1"/>
</svg>
