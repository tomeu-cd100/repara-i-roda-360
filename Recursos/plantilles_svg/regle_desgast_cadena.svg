<svg xmlns="http://www.w3.org/2000/svg" width="320mm" height="22mm" viewBox="0 0 320 22">
  <!-- Plantilla M5: regle de desgast de cadena. Unitats = mm.
       Una cadena de baixa 1/2" té 12,7 mm per baula. 24 baules NOVES = 304,8 mm.
       Es mesura de centre a centre de dos passadors separats 24 baules:
         · si arriba a la marca "0,75%" (307,1 mm) → CADENA MOLT GASTADA (canviar).
       Col·loca el passador de referència a la marca "0" i llegeix on cau l'altre.
       CONVENCIÓ: vermell #FF0000 = TALL · negre = GRAVAT. -->
  <!-- TALL: contorn -->
  <rect x="0.1" y="0.1" width="319.8" height="21.8" rx="2" ry="2"
        fill="none" stroke="#FF0000" stroke-width="0.1"/>
  <!-- TALL: forat de penjar -->
  <circle cx="6" cy="11" r="1.6" fill="none" stroke="#FF0000" stroke-width="0.1"/>

  <!-- GRAVAT: marca 0 (referència) -->
  <line x1="12" y1="3" x2="12" y2="19" stroke="#000000" stroke-width="0.3"/>
  <text x="12" y="21.5" font-family="Arial" font-size="2.6" fill="#000000" text-anchor="middle">0</text>

  <!-- GRAVAT: 304,8 mm = cadena NOVA (12 + 304,8 = 316,8) -->
  <line x1="316.8" y1="6" x2="316.8" y2="16" stroke="#000000" stroke-width="0.25"/>
  <text x="314" y="4.5" font-family="Arial" font-size="2.4" fill="#000000" text-anchor="end">nova</text>

  <!-- GRAVAT: 0,5% desgast (12 + 306,3 = 318,3) — vigilar -->
  <line x1="318.3" y1="6" x2="318.3" y2="16" stroke="#000000" stroke-width="0.25"/>
  <text x="318.3" y="4.5" font-family="Arial" font-size="2.2" fill="#000000" text-anchor="middle">0,5%</text>

  <!-- Escala de mm cada 10 mm (gravat lleuger) -->
  <g stroke="#000000" stroke-width="0.12">
    <line x1="42"  y1="17" x2="42"  y2="19"/><line x1="72"  y1="17" x2="72"  y2="19"/>
    <line x1="102" y1="17" x2="102" y2="19"/><line x1="132" y1="17" x2="132" y2="19"/>
    <line x1="162" y1="17" x2="162" y2="19"/><line x1="192" y1="17" x2="192" y2="19"/>
    <line x1="222" y1="17" x2="222" y2="19"/><line x1="252" y1="17" x2="252" y2="19"/>
    <line x1="282" y1="17" x2="282" y2="19"/><line x1="312" y1="17" x2="312" y2="19"/>
  </g>
  <text x="160" y="12" font-family="Arial" font-size="3.4" fill="#000000" text-anchor="middle">REGLE DE DESGAST DE CADENA · Repara i Roda 360</text>
</svg>
